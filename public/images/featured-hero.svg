<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 1320" width="1100" height="1320" role="img" aria-label="Eval-driven AI authoring system">
  <defs>
    <radialGradient id="fglow" cx="78%" cy="12%" r="80%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.24"/>
      <stop offset="52%" stop-color="#fbbf24" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0a0e1a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="famber" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/><stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="1100" height="1320" fill="#0a0e1a"/>
  <rect width="1100" height="1320" fill="url(#fglow)"/>
  <g stroke="#f59e0b" stroke-opacity="0.05" stroke-width="1">
    <path d="M0 260H1100M0 520H1100M0 780H1100M0 1040H1100M275 0V1320M550 0V1320M825 0V1320"/>
  </g>
  <rect width="1100" height="12" fill="url(#famber)"/>

  <text x="70" y="98" font-family="ui-sans-serif,system-ui,Segoe UI,Helvetica,Arial" font-size="26" letter-spacing="6" font-weight="700" fill="url(#famber)">EVAL-DRIVEN AI AUTHORING</text>
  <path d="M70 122 H1030" stroke="#f59e0b" stroke-opacity="0.2" stroke-width="2"/>

  <!-- orchestrator -->
  <rect x="370" y="166" width="360" height="86" rx="16" fill="#111827" stroke="#f59e0b" stroke-width="3"/>
  <text x="550" y="218" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="30" fill="#f8fafc">orchestrator agent</text>

  <!-- bus to skills -->
  <g fill="none" stroke="#3b4761" stroke-width="3">
    <path d="M550 252 V292 M200 292 H900 M200 292 V322 M433 292 V322 M666 292 V322 M900 292 V322"/>
  </g>
  <g fill="#0a0e1a" stroke="#f59e0b" stroke-width="3">
    <circle cx="200" cy="352" r="30"/><circle cx="433" cy="352" r="30"/><circle cx="666" cy="352" r="30"/><circle cx="900" cy="352" r="30"/>
  </g>
  <text x="550" y="426" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="24" fill="#9ca3af">isolated per-stage skills</text>

  <!-- judge <-> fixer loop -->
  <g fill="none" stroke="#3b4761" stroke-width="3"><path d="M550 446 V470 M250 470 H850 M250 470 V496 M850 470 V496"/></g>
  <rect x="150" y="496" width="220" height="76" rx="14" fill="#111827" stroke="#f59e0b" stroke-width="3"/>
  <text x="260" y="544" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="26" fill="#f8fafc">judge</text>
  <rect x="730" y="496" width="220" height="76" rx="14" fill="#111827" stroke="#f59e0b" stroke-width="3"/>
  <text x="840" y="544" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="26" fill="#f8fafc">fixer</text>
  <path d="M370 520 C500 476 600 476 730 520" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <path d="M730 520 l-24 -6 l10 22 z" fill="#fbbf24"/>
  <text x="550" y="486" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="22" fill="#fbbf24">critique</text>
  <path d="M730 548 C600 592 500 592 370 548" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <path d="M370 548 l24 6 l-10 -22 z" fill="#fbbf24"/>
  <text x="550" y="600" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="22" fill="#fbbf24">refine</text>

  <!-- hard gate -->
  <path d="M550 612 V648" fill="none" stroke="#3b4761" stroke-width="3"/>
  <rect x="360" y="648" width="380" height="132" rx="18" fill="#1a2234" stroke="#fbbf24" stroke-width="4"/>
  <rect x="376" y="664" width="348" height="100" rx="12" fill="none" stroke="#fbbf24" stroke-opacity="0.3" stroke-width="2"/>
  <text x="550" y="708" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="34" font-weight="800" fill="#fbbf24">HARD GATE</text>
  <text x="550" y="744" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="21" fill="#cbd5e1">total &#8805; 80 &#183; every floor &#183; no veto</text>

  <!-- pass / block -->
  <g fill="none" stroke="#3b4761" stroke-width="3"><path d="M550 780 V812 M360 812 H740 M360 812 V840 M740 812 V840"/></g>
  <polyline points="330,856 358,884 410,826" fill="none" stroke="#10b981" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="370" y="936" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="24" fill="#9ca3af">PASS</text>
  <g stroke="#7f8597" stroke-width="9" stroke-linecap="round"><path d="M712 828 L768 884 M768 828 L712 884"/></g>
  <text x="740" y="936" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="24" fill="#9ca3af">BLOCK</text>

  <!-- gold-set calibration panel -->
  <rect x="210" y="1000" width="680" height="150" rx="16" fill="#0d1320" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="2"/>
  <text x="246" y="1052" font-family="ui-sans-serif,system-ui,Arial" font-size="24" fill="#f8fafc">gold set &#183; 10 items</text>
  <text x="854" y="1052" text-anchor="end" font-family="ui-sans-serif,system-ui,Arial" font-size="20" fill="#9ca3af">2 adversarial</text>
  <g>
    <circle cx="252" cy="1100" r="16" fill="#0a0e1a" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="316" cy="1100" r="16" fill="#0a0e1a" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="380" cy="1100" r="16" fill="#0a0e1a" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="444" cy="1100" r="16" fill="#0a0e1a" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="508" cy="1100" r="16" fill="#f59e0b" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="572" cy="1100" r="16" fill="#0a0e1a" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="636" cy="1100" r="16" fill="#0a0e1a" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="700" cy="1100" r="16" fill="#fbbf24" stroke="#fbbf24" stroke-width="3"/>
    <circle cx="764" cy="1100" r="16" fill="#0a0e1a" stroke="#f59e0b" stroke-width="3"/>
    <circle cx="828" cy="1100" r="16" fill="#0a0e1a" stroke="#f59e0b" stroke-width="3"/>
  </g>

  <text x="550" y="1232" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="28" font-weight="800" fill="#f59e0b">0 false-passes</text>
  <text x="550" y="1272" text-anchor="middle" font-family="ui-sans-serif,system-ui,Arial" font-size="20" fill="#9ca3af">a judge that never grades its own work</text>
</svg>
